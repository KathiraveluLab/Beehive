version: "3.8"

services:
  flask-app:
    build: .
    container_name: beehive-backend
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
      - MONGODB_CONNECTION_STRING=mongodb://mongo:27017/beehive
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - REDIRECT_URI=${REDIRECT_URI}
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
      - ADMIN_EMAILS=${ADMIN_EMAILS}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      # Rate limiting 
      - RATE_LIMIT_DEFAULT=${RATE_LIMIT_DEFAULT}
      - RATE_LIMIT_STORAGE_URI=${RATE_LIMIT_STORAGE_URI}
      - RATE_LIMIT_UPLOAD=${RATE_LIMIT_UPLOAD}
      - RATE_LIMIT_ANALYZE_MEDIA=${RATE_LIMIT_ANALYZE_MEDIA}
      - RATE_LIMIT_CHAT_SEND=${RATE_LIMIT_CHAT_SEND}
      - RATE_LIMIT_CHAT_MESSAGES=${RATE_LIMIT_CHAT_MESSAGES}
      - RATE_LIMIT_EDIT_DELETE=${RATE_LIMIT_EDIT_DELETE}
      - RATE_LIMIT_NOTIFICATIONS=${RATE_LIMIT_NOTIFICATIONS}
      - RATE_LIMIT_GET_UPLOADS=${RATE_LIMIT_GET_UPLOADS}
    depends_on:
      - redis
      - mongo
    volumes:
      - .:/app:rw
      - ./client_secret.json:/app/client_secret.json:ro

  frontend:
    build: ./frontend
    container_name: beehive-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    depends_on:
      - flask-app
    volumes:
      - ./frontend:/app:rw
      - /app/node_modules

  redis:
    image: redis:7-alpine
    container_name: beehive-redis
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data

  mongo:
    image: mongo:latest
    container_name: mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=beehive
    volumes:
      - mongo-data:/data/db

volumes:
  redis-data:
  mongo-data:
  